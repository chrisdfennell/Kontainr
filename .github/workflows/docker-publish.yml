name: Build, Push, and Release

on:
  push:
    branches: [dev, main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch and tags
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [ "$BRANCH" = "main" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get next version
        id: version
        if: steps.meta.outputs.is_release == 'true'
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_number=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Dev branch: push as :dev only
      - name: Build and push (dev)
        if: steps.meta.outputs.branch == 'dev'
        uses: docker/build-push-action@v6
        with:
          context: ./Kontainr
          file: ./Kontainr/Dockerfile
          push: true
          tags: fennch/kontainr:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Main branch: push as :latest + :version
      - name: Build and push (main)
        if: steps.meta.outputs.is_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Kontainr
          file: ./Kontainr/Dockerfile
          push: true
          tags: |
            fennch/kontainr:latest
            fennch/kontainr:${{ steps.version.outputs.version_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag
        if: steps.meta.outputs.is_release == 'true'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Generate release notes
        if: steps.meta.outputs.is_release == 'true'
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.version }}" ]; then
            COMMITS=$(git log --oneline -20)
          else
            COMMITS=$(git log --oneline ${PREV_TAG}..HEAD)
          fi

          cat > release-notes.md << HEADER
          ## Docker
          \`\`\`
          docker pull fennch/kontainr:latest
          \`\`\`
          Or a pinned version:
          \`\`\`
          docker pull fennch/kontainr:${{ steps.version.outputs.version_number }}
          \`\`\`

          ## Changes
          HEADER
          echo "$COMMITS" | sed 's/^/- /' >> release-notes.md

      - name: Create GitHub Release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Kontainr ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
